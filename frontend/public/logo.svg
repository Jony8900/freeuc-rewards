<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#F39C12" />
      <stop offset="100%" stop-color="#E67E22" />
    </linearGradient>
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.3" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#F39C12" flood-opacity="0.5" />
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="#0A0A0C"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#goldGradient)" stroke-width="16" filter="url(#shadow)"/>
  
  <!-- Inner circle background -->
  <circle cx="256" cy="256" r="195" fill="#1a1a1f"/>
  
  <!-- Inner gold ring -->
  <circle cx="256" cy="256" r="185" fill="none" stroke="url(#goldGradient)" stroke-width="8"/>
  
  <!-- UC Text -->
  <text x="256" y="290" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="140" font-weight="900" fill="url(#goldGradient)" filter="url(#glow)">UC</text>
  
  <!-- Shine effect -->
  <ellipse cx="180" cy="150" rx="100" ry="70" fill="url(#shineGradient)" opacity="0.4"/>
  
  <!-- Sparkles -->
  <circle cx="130" cy="130" r="8" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="380" cy="150" r="6" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="360" cy="360" r="5" fill="#FFD700" opacity="0.7"/>
</svg>
